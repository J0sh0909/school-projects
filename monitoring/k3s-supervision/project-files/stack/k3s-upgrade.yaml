---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-server
  namespace: system-upgrade
spec:
  concurrency: 1
  channel: https://update.k3s.io/v1-release/channels/stable
  nodeSelector:
    matchExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
  serviceAccountName: system-upgrade
  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
  cordon: true
  drain:
    force: true
    gracePeriod: 600
    skipWaitForDeleteTimeout: 120
    deleteLocalData: true
    ignoreDaemonSets: true
    disableEviction: true
    podSelector:
      matchExpressions:
      - key: app
        operator: NotIn
        values:
        - longhorn-ui
  upgrade:
    image: rancher/k3s-upgrade
---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-agent
  namespace: system-upgrade
spec:
  concurrency: 1
  channel: https://update.k3s.io/v1-release/channels/stable
  nodeSelector:
    matchExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: DoesNotExist
  serviceAccountName: system-upgrade
  cordon: true
  drain:
    force: true
    gracePeriod: 600
    skipWaitForDeleteTimeout: 120
    deleteLocalData: true
    ignoreDaemonSets: true
    disableEviction: true
    podSelector:
      matchExpressions:
      - key: app
        operator: NotIn
        values:
        - longhorn-ui
  upgrade:
    image: rancher/k3s-upgrade
