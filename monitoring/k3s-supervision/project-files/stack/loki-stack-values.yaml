loki:
  config:
    common:
      ring:
        kvstore:
          store: inmemory
    query_scheduler:
      max_outstanding_requests_per_tenant: 2048
    frontend:
      scheduler_address: ""
    ruler:
      storage:
        type: local
        local:
          directory: /etc/loki/rules
      rule_path: /tmp/loki/rules
      alertmanager_url: http://prometheus-stack-kube-prom-alertmanager.monitoring:9093/alertmanager
      ring:
        kvstore:
          store: inmemory
      enable_api: true
      enable_alertmanager_v2: true
  enabled: true
  image:
    tag: 2.9.10
  replicas: 1
  persistence:
    enabled: true
    storageClassName: longhorn-2replicas
    size: 10Gi
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.0.153"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  extraVolumes:
    - name: loki-rules
      configMap:
        name: loki-alert-rules
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /etc/loki/rules/fake
      readOnly: true
promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
grafana:
  enabled: false
datasources:
  enabled: true
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      isDefault: false
      uid: P8E80F9AEF21F6940