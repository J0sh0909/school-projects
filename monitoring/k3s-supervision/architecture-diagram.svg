<svg width="1200" height="820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">K3S Monitoring Infrastructure -- Prometheus + Grafana + Loki + GitLab CI/CD</text>
  <text x="600" y="50" text-anchor="middle" font-size="11" fill="#64748b">3 Servers (etcd HA) + 3 Agents  |  MetalLB  |  Longhorn  |  Traefik  |  192.168.0.0/24</text>

  <!-- ===== NETWORK EDGE ===== -->
  <rect x="30" y="65" width="1140" height="90" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="50" y="85" font-size="11" font-weight="bold" fill="#92400e">Network Edge</text>

  <!-- pfSense -->
  <rect x="50" y="92" width="170" height="50" rx="5" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="135" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">pfSense</text>
  <text x="135" y="128" text-anchor="middle" font-size="9" fill="#fef3c7">192.168.0.1  |  Firewall/NAT/Bridge</text>

  <!-- Bastion -->
  <rect x="240" y="92" width="200" height="50" rx="5" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="340" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Bastion VM</text>
  <text x="340" y="128" text-anchor="middle" font-size="9" fill="#ede9fe">192.168.0.50  |  Tailscale VPN + reverse SSH</text>

  <!-- Traefik x2 -->
  <rect x="460" y="92" width="200" height="50" rx="5" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>
  <text x="560" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Traefik (x2)</text>
  <text x="560" y="128" text-anchor="middle" font-size="9" fill="#cffafe">192.168.0.151  |  Ingress Controller</text>

  <!-- MetalLB -->
  <rect x="680" y="92" width="180" height="50" rx="5" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>
  <text x="770" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">MetalLB</text>
  <text x="770" y="128" text-anchor="middle" font-size="9" fill="#cffafe">Bare-metal load balancer</text>

  <!-- GLPI -->
  <rect x="880" y="92" width="180" height="50" rx="5" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
  <text x="970" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">GLPI</text>
  <text x="970" y="128" text-anchor="middle" font-size="9" fill="#f1f5f9">192.168.0.157  |  IT Asset Mgmt</text>

  <!-- ===== CONTROL PLANE ===== -->
  <rect x="30" y="175" width="550" height="170" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="50" y="196" font-size="11" font-weight="bold" fill="#1d4ed8">K3S Control Plane -- Embedded etcd (HA)</text>

  <!-- Server 1 -->
  <rect x="50" y="205" width="155" height="120" rx="5" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="127" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Server 1</text>
  <text x="127" y="243" text-anchor="middle" font-size="9" fill="#bfdbfe">192.168.0.201</text>
  <text x="127" y="259" text-anchor="middle" font-size="9" fill="#bfdbfe">etcd member</text>
  <text x="127" y="275" text-anchor="middle" font-size="9" fill="#bfdbfe">kubectl</text>

  <!-- Server 2 -->
  <rect x="225" y="205" width="155" height="120" rx="5" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="302" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Server 2</text>
  <text x="302" y="243" text-anchor="middle" font-size="9" fill="#bfdbfe">192.168.0.202</text>
  <text x="302" y="259" text-anchor="middle" font-size="9" fill="#bfdbfe">etcd member</text>
  <text x="302" y="275" text-anchor="middle" font-size="9" fill="#bfdbfe">kubectl</text>

  <!-- Server 3 -->
  <rect x="400" y="205" width="155" height="120" rx="5" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="477" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Server 3</text>
  <text x="477" y="243" text-anchor="middle" font-size="9" fill="#bfdbfe">192.168.0.203</text>
  <text x="477" y="259" text-anchor="middle" font-size="9" fill="#bfdbfe">etcd member</text>
  <text x="477" y="275" text-anchor="middle" font-size="9" fill="#bfdbfe">kubectl</text>

  <!-- ===== MONITORING STACK ===== -->
  <rect x="600" y="175" width="570" height="170" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="620" y="196" font-size="11" font-weight="bold" fill="#166534">Monitoring Stack</text>

  <!-- Prometheus x2 -->
  <rect x="618" y="205" width="145" height="120" rx="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="690" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Prometheus (x2)</text>
  <text x="690" y="243" text-anchor="middle" font-size="9" fill="#fff7ed">192.168.0.155</text>
  <text x="690" y="259" text-anchor="middle" font-size="9" fill="#fff7ed">HA deployment</text>
  <text x="690" y="275" text-anchor="middle" font-size="9" fill="#fff7ed">Scrapes all nodes</text>
  <text x="690" y="291" text-anchor="middle" font-size="9" fill="#fff7ed">+ custom exporters</text>

  <!-- Alertmanager x2 -->
  <rect x="778" y="205" width="145" height="120" rx="5" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="850" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Alertmanager (x2)</text>
  <text x="850" y="243" text-anchor="middle" font-size="9" fill="#fee2e2">192.168.0.156</text>
  <text x="850" y="259" text-anchor="middle" font-size="9" fill="#fee2e2">HA deployment</text>
  <text x="850" y="275" text-anchor="middle" font-size="9" fill="#fee2e2">Dedup + routing</text>
  <text x="850" y="291" text-anchor="middle" font-size="9" fill="#fee2e2">Notifications</text>

  <!-- Grafana -->
  <rect x="938" y="205" width="115" height="55" rx="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="995" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Grafana</text>
  <text x="995" y="243" text-anchor="middle" font-size="9" fill="#fff7ed">192.168.0.153</text>
  <text x="995" y="257" text-anchor="middle" font-size="9" fill="#fff7ed">Dashboards</text>

  <!-- Loki -->
  <rect x="938" y="270" width="115" height="55" rx="5" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="995" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Loki</text>
  <text x="995" y="308" text-anchor="middle" font-size="9" fill="#ddd6fe">192.168.0.154</text>
  <text x="995" y="322" text-anchor="middle" font-size="9" fill="#ddd6fe">Log aggregation</text>

  <!-- ===== WORKER NODES ===== -->
  <rect x="30" y="365" width="780" height="160" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="50" y="385" font-size="11" font-weight="bold" fill="#166534">K3S Worker Nodes (Agents) -- Longhorn PVCs + Trivy scanning</text>

  <!-- Agent 1 -->
  <rect x="50" y="395" width="215" height="115" rx="5" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="157" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Agent 1</text>
  <text x="157" y="433" text-anchor="middle" font-size="9" fill="#dcfce7">192.168.0.101</text>
  <text x="157" y="449" text-anchor="middle" font-size="9" fill="#dcfce7">K3S worker node</text>
  <text x="157" y="465" text-anchor="middle" font-size="9" fill="#dcfce7">Longhorn volume</text>
  <text x="157" y="481" text-anchor="middle" font-size="9" fill="#dcfce7">Trivy scanning</text>

  <!-- Agent 2 -->
  <rect x="285" y="395" width="215" height="115" rx="5" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="392" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Agent 2</text>
  <text x="392" y="433" text-anchor="middle" font-size="9" fill="#dcfce7">192.168.0.102</text>
  <text x="392" y="449" text-anchor="middle" font-size="9" fill="#dcfce7">K3S worker node</text>
  <text x="392" y="465" text-anchor="middle" font-size="9" fill="#dcfce7">Longhorn volume</text>
  <text x="392" y="481" text-anchor="middle" font-size="9" fill="#dcfce7">Trivy scanning</text>

  <!-- Agent 3 -->
  <rect x="520" y="395" width="215" height="115" rx="5" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="627" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Agent 3</text>
  <text x="627" y="433" text-anchor="middle" font-size="9" fill="#dcfce7">192.168.0.103</text>
  <text x="627" y="449" text-anchor="middle" font-size="9" fill="#dcfce7">K3S worker node</text>
  <text x="627" y="465" text-anchor="middle" font-size="9" fill="#dcfce7">Longhorn volume</text>
  <text x="627" y="481" text-anchor="middle" font-size="9" fill="#dcfce7">Trivy scanning</text>

  <!-- ===== LONGHORN ===== -->
  <rect x="830" y="365" width="340" height="160" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="850" y="385" font-size="11" font-weight="bold" fill="#713f12">Storage + Security</text>
  <rect x="850" y="395" width="145" height="60" rx="5" fill="#ca8a04" stroke="#a16207" stroke-width="1.5"/>
  <text x="922" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Longhorn</text>
  <text x="922" y="436" text-anchor="middle" font-size="9" fill="#fef3c7">Distributed block storage</text>
  <text x="922" y="450" text-anchor="middle" font-size="9" fill="#fef3c7">PVCs across agent nodes</text>

  <rect x="1010" y="395" width="145" height="60" rx="5" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="1082" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Trivy</text>
  <text x="1082" y="436" text-anchor="middle" font-size="9" fill="#fee2e2">Container image</text>
  <text x="1082" y="450" text-anchor="middle" font-size="9" fill="#fee2e2">vulnerability scan</text>

  <!-- MariaDB Exporter -->
  <rect x="850" y="468" width="300" height="45" rx="5" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
  <text x="1000" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">MariaDB Exporter</text>
  <text x="1000" y="504" text-anchor="middle" font-size="9" fill="#f1f5f9">Exposes DB metrics to Prometheus</text>

  <!-- ===== CI/CD PIPELINE ===== -->
  <rect x="30" y="545" width="1140" height="130" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="50" y="565" font-size="11" font-weight="bold" fill="#1e293b">GitLab CI/CD Pipeline -- Configuration as Code</text>

  <rect x="50" y="575" width="190" height="85" rx="5" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="145" y="595" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Trigger</text>
  <text x="145" y="613" text-anchor="middle" font-size="9" fill="#ede9fe">Push to GitLab</text>
  <text x="145" y="629" text-anchor="middle" font-size="9" fill="#ede9fe">prometheus.yaml or</text>
  <text x="145" y="645" text-anchor="middle" font-size="9" fill="#ede9fe">mysqlexporter.yaml</text>

  <text x="260" y="618" text-anchor="middle" font-size="16" fill="#94a3b8">--&gt;</text>

  <rect x="280" y="575" width="190" height="85" rx="5" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>
  <text x="375" y="595" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Validate</text>
  <text x="375" y="613" text-anchor="middle" font-size="9" fill="#cffafe">YAML lint</text>
  <text x="375" y="629" text-anchor="middle" font-size="9" fill="#cffafe">Syntax check</text>

  <text x="490" y="618" text-anchor="middle" font-size="16" fill="#94a3b8">--&gt;</text>

  <rect x="510" y="575" width="190" height="85" rx="5" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="605" y="595" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Deploy</text>
  <text x="605" y="613" text-anchor="middle" font-size="9" fill="#dcfce7">helm install</text>
  <text x="605" y="629" text-anchor="middle" font-size="9" fill="#dcfce7">Apply config to cluster</text>

  <text x="720" y="618" text-anchor="middle" font-size="16" fill="#94a3b8">--&gt;</text>

  <rect x="740" y="575" width="190" height="85" rx="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="835" y="595" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Upgrade</text>
  <text x="835" y="613" text-anchor="middle" font-size="9" fill="#fff7ed">helm upgrade</text>
  <text x="835" y="629" text-anchor="middle" font-size="9" fill="#fff7ed">Zero-downtime rollout</text>

  <rect x="960" y="575" width="190" height="85" rx="5" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <text x="1055" y="595" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Helm</text>
  <text x="1055" y="613" text-anchor="middle" font-size="9" fill="#94a3b8">Package manager</text>
  <text x="1055" y="629" text-anchor="middle" font-size="9" fill="#94a3b8">for Kubernetes</text>
  <text x="1055" y="645" text-anchor="middle" font-size="9" fill="#94a3b8">deployments</text>

</svg>
