<svg width="1000" height="820" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Cluster Perimeter -->
  <rect x="50" y="50" width="900" height="680" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2" />
  <text x="500" y="80" font-family="sans-serif" font-weight="bold" font-size="20" text-anchor="middle" fill="#334155">Zabbix HA Monitoring Infrastructure</text>

  <!-- Network / AD Layer -->
  <rect x="70" y="100" width="860" height="100" rx="5" fill="#e2e8f0" stroke="#334155" />
  <text x="500" y="130" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" fill="#334155">Core Network and AD Stack</text>
  <text x="500" y="155" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">AD-DS (192.168.0.50) | DHCP | DNS | Cisco 2960 Switch | Cisco 2911 Router</text>

  <!-- HA Layer -->
  <rect x="70" y="220" width="420" height="200" rx="5" fill="#e2e8f0" stroke="#334155" />
  <text x="280" y="250" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" fill="#334155">Zabbix HA Layer</text>
  <text x="280" y="278" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">2x Zabbix Servers (Apache)</text>
  <text x="280" y="298" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Keepalived (VIP: 192.168.0.100)</text>
  <text x="280" y="318" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">HAProxy Load Balancing</text>
  <text x="280" y="338" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#64748b">Alerts via Google SMTP (external)</text>

  <!-- Data Layer -->
  <rect x="510" y="220" width="420" height="200" rx="5" fill="#e2e8f0" stroke="#334155" />
  <text x="720" y="250" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" fill="#334155">MariaDB Galera Cluster</text>
  <text x="720" y="278" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">3x Synchronous Nodes</text>
  <text x="720" y="298" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">192.168.0.201 / .202 / .203</text>
  <text x="720" y="318" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Shared Backend for Zabbix and GLPI</text>

  <!-- Services -->
  <rect x="70" y="440" width="860" height="160" rx="5" fill="#e2e8f0" stroke="#334155" />
  <text x="500" y="470" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" fill="#334155">Services and Asset Management</text>
  <text x="500" y="498" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">GLPI (192.168.0.51) | Script Server (192.168.0.52) | Grafana (192.168.0.103)</text>
  <text x="500" y="518" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Samba / Windows (192.168.0.150)</text>

  <!-- External SMTP box -->
  <rect x="70" y="625" width="860" height="80" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" />
  <text x="500" y="655" font-family="sans-serif" font-weight="bold" font-size="15" text-anchor="middle" fill="#64748b">External -- Google SMTP</text>
  <text x="500" y="678" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#64748b">smtp.gmail.com:587 (STARTTLS) -- Zabbix alert relay only, no local mail server</text>
</svg>
