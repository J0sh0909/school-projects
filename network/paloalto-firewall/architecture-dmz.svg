<svg width="1100" height="620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">TP3 -- Palo Alto DMZ with Indirect NAT Access</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#64748b">LAN never reaches DMZ directly -- all LAN traffic exits via WAN first, then DNAT redirects to DMZ</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- ===== ZONES ===== -->

  <!-- LAN (TRUST) -->
  <rect x="30" y="65" width="220" height="420" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">LAN (TRUST)</text>
  <text x="140" y="103" text-anchor="middle" font-size="9" fill="#166534">ethernet1/1</text>
  <text x="140" y="117" text-anchor="middle" font-size="9" fill="#166534">192.168.10.1/24</text>

  <!-- Client PC -->
  <rect x="55" y="130" width="170" height="80" rx="5" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="140" y="154" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Client PC</text>
  <text x="140" y="172" text-anchor="middle" font-size="9" fill="#dcfce7">192.168.10.x</text>
  <text x="140" y="188" text-anchor="middle" font-size="9" fill="#dcfce7">Internal user</text>
  <text x="140" y="204" text-anchor="middle" font-size="9" fill="#bbf7d0">TRUST zone member</text>

  <!-- SNAT note -->
  <rect x="55" y="235" width="170" height="50" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="140" y="255" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">SNAT Applied</text>
  <text x="140" y="271" text-anchor="middle" font-size="9" fill="#166534">Source IP masqueraded</text>
  <text x="140" y="283" text-anchor="middle" font-size="9" fill="#166534">to 192.168.2.33 (WAN IP)</text>

  <!-- Rule applied -->
  <rect x="55" y="305" width="170" height="50" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="140" y="323" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">Rule: ALLOW-LAN-TO-WAN</text>
  <text x="140" y="339" text-anchor="middle" font-size="9" fill="#166534">TRUST -- UNTRUST</text>
  <text x="140" y="353" text-anchor="middle" font-size="9" fill="#166534">Allows LAN out to internet</text>

  <!-- No direct LAN-to-DMZ -->
  <rect x="55" y="375" width="170" height="40" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="140" y="393" text-anchor="middle" font-size="9" font-weight="bold" fill="#dc2626">NO LAN-to-DMZ rule</text>
  <text x="140" y="408" text-anchor="middle" font-size="9" fill="#dc2626">Intentional -- by design</text>

  <!-- PALO ALTO FIREWALL (center) -->
  <rect x="280" y="65" width="540" height="420" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="550" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">Palo Alto NGFW -- PAN-OS</text>
  <text x="550" y="105" text-anchor="middle" font-size="10" fill="#1d4ed8">Management: 192.168.10.254  |  Zone-based policy enforcement</text>

  <!-- Interfaces inside firewall -->
  <rect x="300" y="118" width="135" height="60" rx="5" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="367" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">ethernet1/1</text>
  <text x="367" y="154" text-anchor="middle" font-size="9" fill="#bfdbfe">TRUST zone</text>
  <text x="367" y="168" text-anchor="middle" font-size="9" fill="#bfdbfe">192.168.10.1/24</text>

  <rect x="475" y="118" width="150" height="60" rx="5" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="550" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">ethernet1/2</text>
  <text x="550" y="154" text-anchor="middle" font-size="9" fill="#bfdbfe">UNTRUST zone</text>
  <text x="550" y="168" text-anchor="middle" font-size="9" fill="#bfdbfe">192.168.2.33/32 (WAN)</text>

  <rect x="665" y="118" width="135" height="60" rx="5" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="732" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">ethernet1/3</text>
  <text x="732" y="154" text-anchor="middle" font-size="9" fill="#bfdbfe">DMZ zone</text>
  <text x="732" y="168" text-anchor="middle" font-size="9" fill="#bfdbfe">192.168.20.1/24</text>

  <!-- Security Rules table -->
  <rect x="300" y="198" width="500" height="145" rx="5" fill="#1e3a8a" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1"/>
  <text x="550" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">Security Policy Rules</text>

  <rect x="308" y="224" width="484" height="18" rx="2" fill="#1d4ed8"/>
  <text x="380" y="236" font-size="8" font-weight="bold" fill="#ffffff">Rule Name</text>
  <text x="520" y="236" font-size="8" font-weight="bold" fill="#ffffff">Src Zone</text>
  <text x="610" y="236" font-size="8" font-weight="bold" fill="#ffffff">Dst Zone</text>
  <text x="700" y="236" font-size="8" font-weight="bold" fill="#ffffff">Action</text>

  <rect x="308" y="242" width="484" height="18" fill="#dcfce7"/>
  <text x="380" y="254" font-size="8" fill="#166534">ALLOW-WAN-TO-DMZ</text>
  <text x="520" y="254" font-size="8" fill="#166534">UNTRUST</text>
  <text x="610" y="254" font-size="8" fill="#166534">DMZ</text>
  <text x="700" y="254" font-size="8" fill="#166534">Allow (after DNAT)</text>

  <rect x="308" y="260" width="484" height="18" fill="#dbeafe"/>
  <text x="380" y="272" font-size="8" fill="#1d4ed8">ALLOW-DMZ-TO-WAN</text>
  <text x="520" y="272" font-size="8" fill="#1d4ed8">DMZ</text>
  <text x="610" y="272" font-size="8" fill="#1d4ed8">UNTRUST</text>
  <text x="700" y="272" font-size="8" fill="#1d4ed8">Allow (return traffic)</text>

  <rect x="308" y="278" width="484" height="18" fill="#fef9c3"/>
  <text x="380" y="290" font-size="8" fill="#713f12">ALLOW-LAN-TO-WAN</text>
  <text x="520" y="290" font-size="8" fill="#713f12">TRUST</text>
  <text x="610" y="290" font-size="8" fill="#713f12">UNTRUST</text>
  <text x="700" y="290" font-size="8" fill="#713f12">Allow (forces LAN via WAN)</text>

  <rect x="308" y="296" width="484" height="18" fill="#fef2f2"/>
  <text x="380" y="308" font-size="8" fill="#dc2626">DENY-LAN-TO-DMZ (implicit)</text>
  <text x="520" y="308" font-size="8" fill="#dc2626">TRUST</text>
  <text x="610" y="308" font-size="8" fill="#dc2626">DMZ</text>
  <text x="700" y="308" font-size="8" fill="#dc2626">Deny (no rule = no access)</text>

  <!-- NAT Rules table -->
  <rect x="300" y="360" width="500" height="110" rx="5" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="550" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">NAT Policy Rules</text>

  <rect x="308" y="384" width="484" height="18" rx="2" fill="#d97706"/>
  <text x="380" y="396" font-size="8" font-weight="bold" fill="#ffffff">Rule Name</text>
  <text x="490" y="396" font-size="8" font-weight="bold" fill="#ffffff">Type</text>
  <text x="570" y="396" font-size="8" font-weight="bold" fill="#ffffff">Description</text>

  <rect x="308" y="402" width="484" height="24" fill="#fef3c7"/>
  <text x="380" y="418" font-size="8" fill="#713f12">TRUST-TO-UNTRUST</text>
  <text x="490" y="418" font-size="8" fill="#713f12">SNAT</text>
  <text x="570" y="418" font-size="8" fill="#713f12">LAN traffic exits using WAN IP 192.168.2.33 as source</text>

  <rect x="308" y="426" width="484" height="30" fill="#fef9c3"/>
  <text x="380" y="439" font-size="8" fill="#713f12">UNTRUST-TO-DMZ</text>
  <text x="490" y="439" font-size="8" fill="#713f12">DNAT</text>
  <text x="570" y="439" font-size="8" fill="#713f12">HTTPS to 192.168.2.33 (WAN IP)</text>
  <text x="570" y="452" font-size="8" fill="#713f12">redirected to 192.168.20.156 (DMZ web server)</text>

  <!-- DMZ ZONE -->
  <rect x="850" y="65" width="220" height="420" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="960" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">DMZ</text>
  <text x="960" y="103" text-anchor="middle" font-size="9" fill="#b91c1c">ethernet1/3</text>
  <text x="960" y="117" text-anchor="middle" font-size="9" fill="#b91c1c">192.168.20.1/24</text>

  <!-- Web Server -->
  <rect x="875" y="130" width="170" height="100" rx="5" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="960" y="154" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Web Server</text>
  <text x="960" y="172" text-anchor="middle" font-size="9" fill="#fecaca">192.168.20.156</text>
  <text x="960" y="188" text-anchor="middle" font-size="9" fill="#fecaca">HTTPS service</text>
  <text x="960" y="204" text-anchor="middle" font-size="9" fill="#fecaca">Isolated in DMZ</text>
  <text x="960" y="220" text-anchor="middle" font-size="9" fill="#fca5a5">Not directly reachable</text>
  <text x="960" y="234" text-anchor="middle" font-size="9" fill="#fca5a5">from LAN</text>

  <!-- DNAT note -->
  <rect x="875" y="250" width="170" height="60" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="960" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#b91c1c">DNAT Applied</text>
  <text x="960" y="284" text-anchor="middle" font-size="9" fill="#b91c1c">Dest: 192.168.2.33</text>
  <text x="960" y="300" text-anchor="middle" font-size="9" fill="#b91c1c">Translated to: 192.168.20.156</text>

  <!-- Return traffic rule -->
  <rect x="875" y="330" width="170" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="960" y="350" text-anchor="middle" font-size="9" font-weight="bold" fill="#b91c1c">Rule: ALLOW-DMZ-TO-WAN</text>
  <text x="960" y="366" text-anchor="middle" font-size="9" fill="#b91c1c">Return traffic from DMZ</text>
  <text x="960" y="380" text-anchor="middle" font-size="9" fill="#b91c1c">to client (via WAN)</text>

  <!-- Traffic flow arrows -->
  <!-- LAN to Firewall -->
  <line x1="250" y1="200" x2="300" y2="200" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Firewall (WAN) to loopback -->
  <line x1="550" y1="200" x2="550" y2="490" stroke="#f97316" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="556" y="460" font-size="9" fill="#ea580c">SNAT: src=192.168.2.33</text>
  <!-- DNAT back into DMZ -->
  <line x1="800" y1="490" x2="800" y2="200" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="550" y1="490" x2="800" y2="490" stroke="#ea580c" stroke-width="2"/>
  <text x="660" y="506" text-anchor="middle" font-size="9" fill="#ea580c">DNAT: dst=192.168.20.156</text>
  <!-- Firewall to DMZ web server -->
  <line x1="800" y1="200" x2="850" y2="200" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Flow label -->
  <rect x="30" y="510" width="1040" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="550" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Traffic Flow: LAN Client accessing DMZ Web Server</text>
  <text x="550" y="550" text-anchor="middle" font-size="10" fill="#334155">1. Client (192.168.10.x) sends HTTPS request to WAN IP 192.168.2.33</text>
  <text x="550" y="568" text-anchor="middle" font-size="10" fill="#334155">2. ALLOW-LAN-TO-WAN allows egress  |  SNAT masquerades source as 192.168.2.33</text>
  <text x="550" y="586" text-anchor="middle" font-size="10" fill="#334155">3. DNAT triggered: dst 192.168.2.33 translated to 192.168.20.156 (DMZ server)  |  ALLOW-WAN-TO-DMZ permits entry</text>

</svg>
