<svg width="1200" height="780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Enterprise Communications -- Proxmox + FreePBX + Zimbra</text>
  <text x="600" y="50" text-anchor="middle" font-size="11" fill="#64748b">Proxmox bare-metal  |  8 VLANs  |  VoIP IVR 5 depts  |  Voicemail-to-email  |  AD-DS/DNS/DHCP</text>

  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- ===== NETWORK EDGE ===== -->
  <rect x="30" y="65" width="1140" height="75" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="50" y="83" font-size="11" font-weight="bold" fill="#92400e">Network Edge</text>

  <!-- Router -->
  <rect x="50" y="88" width="240" height="42" rx="5" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="170" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">RT-H33 (Router)</text>
  <text x="170" y="122" text-anchor="middle" font-size="9" fill="#fef3c7">NAT to school network  |  172.30.0.0/24 uplink  |  Static routes to all VLANs</text>

  <!-- L3 Switch -->
  <rect x="320" y="88" width="280" height="42" rx="5" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="460" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">SW3-H33 (L3 Switch)</text>
  <text x="460" y="122" text-anchor="middle" font-size="9" fill="#fef3c7">Inter-VLAN routing  |  Trunk to Proxmox + SW2  |  Uplink to RT-H33</text>

  <!-- L2 Switch -->
  <rect x="630" y="88" width="280" height="42" rx="5" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="770" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">SW2-H33 (L2 Switch)</text>
  <text x="770" y="122" text-anchor="middle" font-size="9" fill="#fef3c7">Access ports  |  LLDP  |  Voice VLANs  |  Trunk to SW3</text>

  <!-- School net -->
  <ellipse cx="1070" cy="109" rx="80" ry="28" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="1070" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">School</text>
  <text x="1070" y="120" text-anchor="middle" font-size="9" fill="#64748b">Network / Internet</text>
  <line x1="610" y1="109" x2="990" y2="109" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ===== PROXMOX HYPERVISOR ===== -->
  <rect x="30" y="160" width="680" height="390" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="50" y="180" font-size="11" font-weight="bold" fill="#1d4ed8">Proxmox VE -- Bare-Metal Hypervisor (Physical School PC)</text>

  <!-- Windows Server VM -->
  <rect x="50" y="188" width="300" height="120" rx="6" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>
  <text x="200" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Windows Server 2019 VM</text>
  <text x="200" y="228" text-anchor="middle" font-size="10" fill="#cffafe">VirtIO drivers</text>
  <text x="200" y="244" text-anchor="middle" font-size="10" fill="#cffafe">AD-DS -- Domain Controller</text>
  <text x="200" y="260" text-anchor="middle" font-size="10" fill="#cffafe">DNS -- ad.h33.local</text>
  <text x="200" y="276" text-anchor="middle" font-size="10" fill="#cffafe">DHCP -- all VLANs</text>
  <text x="200" y="292" text-anchor="middle" font-size="9" fill="#a5f3fc">VLAN 110 -- SERV-ADMIN  172.16.32.0/19</text>

  <!-- Zimbra VM -->
  <rect x="370" y="188" width="300" height="120" rx="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="520" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Zimbra 8 VM</text>
  <text x="520" y="228" text-anchor="middle" font-size="10" fill="#ddd6fe">Rocky Linux 8</text>
  <text x="520" y="244" text-anchor="middle" font-size="10" fill="#ddd6fe">Corporate email server</text>
  <text x="520" y="260" text-anchor="middle" font-size="10" fill="#ddd6fe">dept@zimbra.ad.h33.local</text>
  <text x="520" y="276" text-anchor="middle" font-size="10" fill="#ddd6fe">Receives voicemail attachments</text>
  <text x="520" y="292" text-anchor="middle" font-size="9" fill="#c4b5fd">VLAN 100 -- SERV-COMM  172.16.0.0/19</text>

  <!-- FreePBX VM -->
  <rect x="50" y="325" width="620" height="205" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="360" y="347" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">FreePBX VM -- SNG7-PBX  |  VoIP PBX</text>
  <text x="360" y="363" text-anchor="middle" font-size="10" fill="#dcfce7">VLAN 100 -- SERV-COMM  172.16.0.0/19  |  SIP protocol</text>

  <!-- Departments table -->
  <rect x="68" y="373" width="590" height="147" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>

  <!-- Header row -->
  <rect x="68" y="373" width="590" height="22" rx="4" fill="#15803d"/>
  <text x="150" y="388" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Department</text>
  <text x="310" y="388" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Extensions</text>
  <text x="440" y="388" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Ring Group</text>
  <text x="590" y="388" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Hunt Strategy</text>

  <text x="150" y="406" text-anchor="middle" font-size="9" fill="#166534">Direction</text>
  <text x="310" y="406" text-anchor="middle" font-size="9" fill="#166534">1001-1004 (4 users)</text>
  <text x="440" y="406" text-anchor="middle" font-size="9" fill="#166534">Direction</text>
  <text x="590" y="406" text-anchor="middle" font-size="9" fill="#166534">Manual</text>

  <text x="150" y="422" text-anchor="middle" font-size="9" fill="#166534">Ventes</text>
  <text x="310" y="422" text-anchor="middle" font-size="9" fill="#166534">3001-3002 (2 users)</text>
  <text x="440" y="422" text-anchor="middle" font-size="9" fill="#166534">Ventes</text>
  <text x="590" y="422" text-anchor="middle" font-size="9" fill="#166534">Hunt 3001 to 3002</text>

  <text x="150" y="438" text-anchor="middle" font-size="9" fill="#166534">Service client</text>
  <text x="310" y="438" text-anchor="middle" font-size="9" fill="#166534">2001-2003 (3 users)</text>
  <text x="440" y="438" text-anchor="middle" font-size="9" fill="#166534">Service client</text>
  <text x="590" y="438" text-anchor="middle" font-size="9" fill="#166534">Memory hunt 2001-2002-2003</text>

  <text x="150" y="454" text-anchor="middle" font-size="9" fill="#166534">Production</text>
  <text x="310" y="454" text-anchor="middle" font-size="9" fill="#166534">5001-5002 (2 users)</text>
  <text x="440" y="454" text-anchor="middle" font-size="9" fill="#166534">Production</text>
  <text x="590" y="454" text-anchor="middle" font-size="9" fill="#166534">Manual</text>

  <text x="150" y="470" text-anchor="middle" font-size="9" fill="#166534">Finances</text>
  <text x="310" y="470" text-anchor="middle" font-size="9" fill="#166534">4001-4002 (2 users)</text>
  <text x="440" y="470" text-anchor="middle" font-size="9" fill="#166534">Finances</text>
  <text x="590" y="470" text-anchor="middle" font-size="9" fill="#166534">Manual</text>

  <text x="360" y="504" text-anchor="middle" font-size="9" fill="#14532d">IVR: FR/EN greeting -- dept selection -- office hours -- 3 invalid attempts -- VM fallback</text>
  <text x="360" y="520" text-anchor="middle" font-size="9" fill="#14532d">Voicemail forwarded as email attachment to dept@zimbra.ad.h33.local</text>

  <!-- ===== VLAN TABLE ===== -->
  <rect x="730" y="160" width="440" height="390" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="750" y="180" font-size="11" font-weight="bold" fill="#1e293b">VLAN Segmentation</text>

  <!-- VLAN header -->
  <rect x="748" y="188" width="404" height="22" rx="3" fill="#1e293b"/>
  <text x="780" y="203" font-size="9" font-weight="bold" fill="#ffffff">VLAN</text>
  <text x="830" y="203" font-size="9" font-weight="bold" fill="#ffffff">Name</text>
  <text x="950" y="203" font-size="9" font-weight="bold" fill="#ffffff">Subnet</text>
  <text x="1080" y="203" font-size="9" font-weight="bold" fill="#ffffff">Purpose</text>

  <!-- VLAN rows -->
  <rect x="748" y="210" width="404" height="22" rx="0" fill="#7c3aed" fill-opacity="0.15"/>
  <text x="780" y="225" font-size="9" fill="#334155">100</text>
  <text x="830" y="225" font-size="9" fill="#334155">SERV-COMM</text>
  <text x="950" y="225" font-size="9" fill="#334155">172.16.0.0/19</text>
  <text x="1080" y="225" font-size="9" fill="#334155">Zimbra, FreePBX</text>

  <rect x="748" y="232" width="404" height="22" rx="0" fill="#0891b2" fill-opacity="0.15"/>
  <text x="780" y="247" font-size="9" fill="#334155">110</text>
  <text x="830" y="247" font-size="9" fill="#334155">SERV-ADMIN</text>
  <text x="950" y="247" font-size="9" fill="#334155">172.16.32.0/19</text>
  <text x="1080" y="247" font-size="9" fill="#334155">AD-DS, DNS, DHCP</text>

  <rect x="748" y="254" width="404" height="22" rx="0" fill="#16a34a" fill-opacity="0.15"/>
  <text x="780" y="269" font-size="9" fill="#334155">50</text>
  <text x="830" y="269" font-size="9" fill="#334155">CLIENTS-INT</text>
  <text x="950" y="269" font-size="9" fill="#334155">172.16.64.0/19</text>
  <text x="1080" y="269" font-size="9" fill="#334155">Internal Proxmox clients</text>

  <rect x="748" y="276" width="404" height="22" rx="0" fill="#f97316" fill-opacity="0.15"/>
  <text x="780" y="291" font-size="9" fill="#334155">10</text>
  <text x="830" y="291" font-size="9" fill="#334155">CLIENTS-EX-1</text>
  <text x="950" y="291" font-size="9" fill="#334155">172.16.96.0/19</text>
  <text x="1080" y="291" font-size="9" fill="#334155">External clients group 1</text>

  <rect x="748" y="298" width="404" height="22" rx="0" fill="#f97316" fill-opacity="0.15"/>
  <text x="780" y="313" font-size="9" fill="#334155">20</text>
  <text x="830" y="313" font-size="9" fill="#334155">CLIENTS-EX-2</text>
  <text x="950" y="313" font-size="9" fill="#334155">172.16.128.0/19</text>
  <text x="1080" y="313" font-size="9" fill="#334155">External clients group 2</text>

  <rect x="748" y="320" width="404" height="22" rx="0" fill="#dc2626" fill-opacity="0.15"/>
  <text x="780" y="335" font-size="9" fill="#334155">11</text>
  <text x="830" y="335" font-size="9" fill="#334155">CLIENTS-EX-V-1</text>
  <text x="950" y="335" font-size="9" fill="#334155">172.16.160.0/19</text>
  <text x="1080" y="335" font-size="9" fill="#334155">Voice VLAN group 1</text>

  <rect x="748" y="342" width="404" height="22" rx="0" fill="#dc2626" fill-opacity="0.15"/>
  <text x="780" y="357" font-size="9" fill="#334155">21</text>
  <text x="830" y="357" font-size="9" fill="#334155">CLIENTS-EX-V-2</text>
  <text x="950" y="357" font-size="9" fill="#334155">172.16.192.0/19</text>
  <text x="1080" y="357" font-size="9" fill="#334155">Voice VLAN group 2</text>

  <rect x="748" y="364" width="404" height="22" rx="0" fill="#64748b" fill-opacity="0.15"/>
  <text x="780" y="379" font-size="9" fill="#334155">999</text>
  <text x="830" y="379" font-size="9" fill="#334155">PROXMOX</text>
  <text x="950" y="379" font-size="9" fill="#334155">172.16.224.0/19</text>
  <text x="1080" y="379" font-size="9" fill="#334155">Hypervisor mgmt</text>

  <rect x="748" y="386" width="404" height="22" rx="0" fill="#94a3b8" fill-opacity="0.15"/>
  <text x="780" y="401" font-size="9" fill="#334155">666</text>
  <text x="830" y="401" font-size="9" fill="#334155">Native</text>
  <text x="950" y="401" font-size="9" fill="#334155">--</text>
  <text x="1080" y="401" font-size="9" fill="#334155">Untagged native VLAN</text>

  <!-- Physical phones note -->
  <rect x="748" y="420" width="404" height="120" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="950" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Physical IP Phones</text>
  <text x="768" y="458" font-size="10" fill="#166534">- Connected to SW2-H33 access ports</text>
  <text x="768" y="474" font-size="10" fill="#166534">- LLDP for automatic VLAN assignment</text>
  <text x="768" y="490" font-size="10" fill="#166534">- Voice VLANs 11 and 21</text>
  <text x="768" y="506" font-size="10" fill="#166534">- SIP registration to FreePBX</text>
  <text x="768" y="522" font-size="10" fill="#166534">- Used by all 5 departments</text>

  <!-- ===== VOICEMAIL ARROW ===== -->
  <line x1="360" y1="520" x2="500" y2="308" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="395" y="420" font-size="9" fill="#7c3aed">Voicemail</text>
  <text x="395" y="433" font-size="9" fill="#7c3aed">to email</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="568" width="1140" height="190" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="50" y="588" font-size="11" font-weight="bold" fill="#1e293b">My Contributions (100% of infrastructure)</text>
  <text x="50" y="608" font-size="10" fill="#334155">Proxmox installation bare-metal on physical school PC</text>
  <text x="50" y="626" font-size="10" fill="#334155">VM deployment: VirtIO drivers for Windows, network interfaces for all VMs</text>
  <text x="50" y="644" font-size="10" fill="#334155">All network configs: RT-H33 (NAT, static routes), SW3-H33 (L3, inter-VLAN), SW2-H33 (L2, trunking, LLDP)</text>
  <text x="50" y="662" font-size="10" fill="#334155">8 VLANs configured  |  Windows Server (AD-DS, DNS, DHCP)  |  Zimbra installation</text>
  <text x="600" y="608" font-size="10" fill="#64748b">Teammate: FreePBX IVR config, extensions, ring groups, hunt groups</text>
  <rect x="50" y="676" width="14" height="12" rx="2" fill="#0891b2"/>
  <text x="72" y="687" font-size="10" fill="#334155">AD-DS/DNS/DHCP</text>
  <rect x="200" y="676" width="14" height="12" rx="2" fill="#7c3aed"/>
  <text x="222" y="687" font-size="10" fill="#334155">Zimbra email</text>
  <rect x="350" y="676" width="14" height="12" rx="2" fill="#16a34a"/>
  <text x="372" y="687" font-size="10" fill="#334155">FreePBX VoIP</text>
  <rect x="500" y="676" width="14" height="12" rx="2" fill="#d97706"/>
  <text x="522" y="687" font-size="10" fill="#334155">Network (Router + L3 + L2)</text>
  <text x="50" y="748" font-size="9" fill="#64748b">Tech: Proxmox VE  |  FreePBX (SNG7-PBX)  |  Zimbra 8  |  Windows Server 2019  |  VirtIO  |  SIP  |  802.1Q trunking  |  LLDP</text>

