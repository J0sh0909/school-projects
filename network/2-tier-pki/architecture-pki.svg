<svg width="1100" height="720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">2-Tier Microsoft PKI -- AD CS + OpenSSL  |  Windows Server 2022</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#64748b">420-H54-RO  |  Root CA (offline) -- Intermediate CA -- Web Server  |  CRL via HTTP  |  SAN certs</text>

  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- ===== ROOT CA ===== -->
  <rect x="30" y="65" width="1040" height="150" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="50" y="85" font-size="11" font-weight="bold" fill="#b91c1c">Tier 1 -- Root CA  (OFFLINE after signing)</text>

  <!-- Root CA box -->
  <rect x="50" y="93" width="320" height="108" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="2"/>
  <text x="210" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">ROOT-JMR-A2025</text>
  <text x="210" y="133" text-anchor="middle" font-size="10" fill="#fecaca">192.168.2.183  |  Windows Server 2022</text>
  <text x="210" y="149" text-anchor="middle" font-size="10" fill="#fecaca">AD CS -- Standalone Root CA</text>
  <text x="210" y="165" text-anchor="middle" font-size="10" fill="#fecaca">RSA 4096  |  SHA-256  |  Self-signed</text>
  <text x="210" y="181" text-anchor="middle" font-size="10" fill="#fecaca">Validity: 20 years</text>
  <text x="210" y="197" text-anchor="middle" font-size="9" fill="#fca5a5">OFFLINE -- kept powered off after signing</text>

  <!-- Root CA details -->
  <rect x="400" y="93" width="640" height="108" rx="6" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="420" y="113" font-size="10" font-weight="bold" fill="#9f1239">Root CA Process</text>
  <text x="420" y="131" font-size="10" fill="#334155">1. Install AD CS as standalone root CA</text>
  <text x="420" y="147" font-size="10" fill="#334155">2. Configure CDP URLs pointing to web server (HTTP CertEnroll)</text>
  <text x="420" y="163" font-size="10" fill="#334155">3. Generate RSA 4096 private key + self-sign root certificate</text>
  <text x="420" y="179" font-size="10" fill="#334155">4. Publish root CRL to CertEnroll on web server</text>
  <text x="420" y="195" font-size="10" fill="#b91c1c">5. Sign the Intermediate CA certificate -- then GO OFFLINE</text>

  <!-- ===== ARROW ROOT TO INTERMEDIATE ===== -->
  <line x1="550" y1="215" x2="550" y2="245" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="560" y="234" font-size="9" fill="#dc2626">Signs cert</text>

  <!-- ===== INTERMEDIATE CA ===== -->
  <rect x="30" y="245" width="1040" height="155" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="50" y="265" font-size="11" font-weight="bold" fill="#92400e">Tier 2 -- Intermediate CA (Subordinate)</text>

  <!-- Intermediate box -->
  <rect x="50" y="273" width="320" height="113" rx="6" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <text x="210" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">SUB-JMR-A2025</text>
  <text x="210" y="313" text-anchor="middle" font-size="10" fill="#fef3c7">192.168.2.184  |  Windows Server 2022</text>
  <text x="210" y="329" text-anchor="middle" font-size="10" fill="#fef3c7">AD CS -- Subordinate CA</text>
  <text x="210" y="345" text-anchor="middle" font-size="10" fill="#fef3c7">Signs end-entity certificates</text>
  <text x="210" y="361" text-anchor="middle" font-size="10" fill="#fef3c7">Publishes intermediate CRL</text>
  <text x="210" y="377" text-anchor="middle" font-size="9" fill="#fde68a">STAYS ONLINE to sign web server cert</text>

  <!-- Intermediate details -->
  <rect x="400" y="273" width="640" height="113" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="420" y="293" font-size="10" font-weight="bold" fill="#92400e">Intermediate CA Process</text>
  <text x="420" y="311" font-size="10" fill="#334155">1. Install AD CS as subordinate CA (service won't start yet -- normal)</text>
  <text x="420" y="327" font-size="10" fill="#334155">2. Configure intermediate CDP URLs</text>
  <text x="420" y="343" font-size="10" fill="#334155">3. Generate private key + create CSR -- submit to Root CA</text>
  <text x="420" y="359" font-size="10" fill="#334155">4. Import signed cert + root CRL to bring AD CS online</text>
  <text x="420" y="375" font-size="10" fill="#334155">5. Publish intermediate CRL  |  Distribute certs to client trust stores</text>

  <!-- ===== ARROW INTERMEDIATE TO WEB ===== -->
  <line x1="550" y1="400" x2="550" y2="430" stroke="#d97706" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="560" y="419" font-size="9" fill="#d97706">Signs cert</text>

  <!-- ===== WEB SERVER ===== -->
  <rect x="30" y="430" width="1040" height="175" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="50" y="450" font-size="11" font-weight="bold" fill="#1d4ed8">Tier 3 -- Web Server + CRL Distribution Point</text>

  <!-- Web Server box -->
  <rect x="50" y="458" width="320" height="133" rx="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <text x="210" y="480" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">WEB-JMR-A2025</text>
  <text x="210" y="498" text-anchor="middle" font-size="10" fill="#bfdbfe">192.168.2.185  |  Windows Server 2022</text>
  <text x="210" y="514" text-anchor="middle" font-size="10" fill="#bfdbfe">IIS -- HTTPS site on port 443</text>
  <text x="210" y="530" text-anchor="middle" font-size="10" fill="#bfdbfe">CertEnroll virtual dir (HTTP)</text>
  <text x="210" y="546" text-anchor="middle" font-size="10" fill="#bfdbfe">Hosts Root + Intermediate CRL</text>
  <text x="210" y="562" text-anchor="middle" font-size="10" fill="#bfdbfe">MIME types: .crt .cer .crl .p7b</text>
  <text x="210" y="579" text-anchor="middle" font-size="9" fill="#93c5fd">End-entity cert -- 1 year validity  |  SAN config</text>

  <!-- Web Server details -->
  <rect x="400" y="458" width="640" height="133" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="420" y="478" font-size="10" font-weight="bold" fill="#1d4ed8">Web Server Certificate Process</text>
  <text x="420" y="496" font-size="10" fill="#334155">1. Create SAN config file (DNS.1 + IP.1) -- required by modern browsers</text>
  <text x="420" y="512" font-size="10" fill="#334155">2. Generate web server private key + CSR using SAN config</text>
  <text x="420" y="528" font-size="10" fill="#334155">3. Submit CSR to Intermediate CA -- sign + export certificate</text>
  <text x="420" y="544" font-size="10" fill="#334155">4. Create PFX bundle (web cert + private key + intermediate cert)</text>
  <text x="420" y="560" font-size="10" fill="#334155">5. Install IIS + configure CertEnroll virtual dir + add MIME types</text>
  <text x="420" y="576" font-size="10" fill="#334155">6. Import PFX into IIS -- bind to default site port 443</text>

  <!-- ===== CRL DISTRIBUTION ARROWS ===== -->
  <!-- Root CA publishes CRL to web server -->
  <line x1="370" y1="155" x2="600" y2="490" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <text x="440" y="310" font-size="9" fill="#dc2626">Root CRL</text>
  <!-- Intermediate publishes CRL to web server -->
  <line x1="370" y1="350" x2="580" y2="470" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="390" y="430" font-size="9" fill="#d97706">Intermediate CRL</text>

  <!-- ===== TRUST CHAIN FOOTER ===== -->
  <rect x="30" y="625" width="1040" height="75" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="550" y="648" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Certificate Trust Chain</text>
  <!-- Chain graphic -->
  <rect x="100" y="658" width="170" height="28" rx="4" fill="#dc2626" stroke="#b91c1c"/>
  <text x="185" y="676" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Root CA (self-signed)</text>
  <text x="280" y="676" text-anchor="middle" font-size="14" fill="#94a3b8">--&gt;</text>
  <rect x="310" y="658" width="200" height="28" rx="4" fill="#d97706" stroke="#b45309"/>
  <text x="410" y="676" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Intermediate CA (signed by Root)</text>
  <text x="520" y="676" text-anchor="middle" font-size="14" fill="#94a3b8">--&gt;</text>
  <rect x="550" y="658" width="250" height="28" rx="4" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="675" y="676" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Web Server Cert (signed by Intermediate)</text>
  <text x="810" y="676" text-anchor="middle" font-size="14" fill="#94a3b8">--&gt;</text>
  <rect x="840" y="658" width="200" height="28" rx="4" fill="#16a34a" stroke="#15803d"/>
  <text x="940" y="676" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Browser trusts HTTPS site</text>

</svg>
