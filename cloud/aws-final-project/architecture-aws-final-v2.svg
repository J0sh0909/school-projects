<svg width="1200" height="760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">AWS Multi-Account Infrastructure -- Mattermost, Nextcloud, GLPI, RDS</text>
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#64748b">420-H73-RO  |  2 VPCs  |  VPC Peering  |  VPN SSH  |  CloudWatch + SNS</text>

  <!-- ======================== ACCOUNT A ======================== -->
  <rect x="30" y="68" width="640" height="600" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">Account A -- us-east-1a</text>

  <!-- VPC A border -->
  <rect x="50" y="100" width="600" height="550" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="70" y="120" font-size="11" font-weight="bold" fill="#1d4ed8">VPC A -- 192.168.0.0/16</text>

  <!-- Public subnet A -->
  <rect x="70" y="130" width="560" height="80" rx="6" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="90" y="150" font-size="10" font-weight="bold" fill="#1e40af">Public Subnet</text>

  <!-- Internet Gateway -->
  <rect x="90" y="158" width="120" height="36" rx="4" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="150" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Internet Gateway</text>
  <text x="150" y="188" text-anchor="middle" font-size="9" fill="#bfdbfe">HTTPS open</text>

  <!-- VPN endpoint -->
  <rect x="240" y="158" width="140" height="36" rx="4" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="310" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">VPN Gateway</text>
  <text x="310" y="188" text-anchor="middle" font-size="9" fill="#bfdbfe">SSH: 192.168.0.32/27</text>

  <!-- Route 53 -->
  <rect x="410" y="158" width="100" height="36" rx="4" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="460" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Route 53</text>
  <text x="460" y="188" text-anchor="middle" font-size="9" fill="#ddd6fe">DNS / HTTPS</text>

  <!-- S3 -->
  <rect x="534" y="158" width="80" height="36" rx="4" fill="#059669" stroke="#047857" stroke-width="1.5"/>
  <text x="574" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">S3</text>
  <text x="574" y="188" text-anchor="middle" font-size="9" fill="#a7f3d0">Nextcloud files</text>

  <!-- App subnet A -->
  <rect x="70" y="228" width="560" height="200" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="90" y="248" font-size="10" font-weight="bold" fill="#0c4a6e">Application Subnet -- 192.168.100.0/24  +  192.168.150.0/24</text>

  <!-- Mattermost EC2 -->
  <rect x="90" y="258" width="230" height="80" rx="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="205" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Mattermost</text>
  <text x="205" y="292" text-anchor="middle" font-size="9" fill="#fff7ed">t3.small  |  Ubuntu 24.04</text>
  <text x="205" y="306" text-anchor="middle" font-size="9" fill="#fff7ed">Apache rev-proxy  |  GLPIInventory</text>
  <text x="205" y="320" text-anchor="middle" font-size="9" fill="#fff7ed">IP: 192.168.100.193</text>
  <text x="205" y="332" text-anchor="middle" font-size="9" fill="#ffedd5">SG: HTTPS open, SSH via VPN only</text>

  <!-- Nextcloud EC2 -->
  <rect x="370" y="258" width="230" height="80" rx="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="485" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Nextcloud</text>
  <text x="485" y="292" text-anchor="middle" font-size="9" fill="#fff7ed">t3.micro  |  Ubuntu 24.04</text>
  <text x="485" y="306" text-anchor="middle" font-size="9" fill="#fff7ed">Apache  |  GLPIInventory  |  S3</text>
  <text x="485" y="320" text-anchor="middle" font-size="9" fill="#fff7ed">IP: 192.168.150.156</text>
  <text x="485" y="332" text-anchor="middle" font-size="9" fill="#ffedd5">SG: HTTPS open, SSH via VPN only</text>

  <!-- Private subnet A (RDS) -->
  <rect x="70" y="445" width="560" height="90" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="90" y="463" font-size="10" font-weight="bold" fill="#92400e">Private Subnet -- 192.168.50.0/24  (no public IP)</text>

  <!-- RDS -->
  <rect x="200" y="473" width="240" height="48" rx="5" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="320" y="493" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">RDS MySQL 8.0</text>
  <text x="320" y="509" text-anchor="middle" font-size="9" fill="#fef3c7">db.t4g.micro  |  IP: 192.168.50.156  |  No public IP</text>
  <text x="320" y="522" text-anchor="middle" font-size="9" fill="#fef3c7">SG: accessible from app subnets only</text>

  <!-- CloudWatch A -->
  <rect x="70" y="550" width="560" height="80" rx="6" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="90" y="570" font-size="10" font-weight="bold" fill="#166534">CloudWatch -- Per-instance dashboards + alarms</text>
  <rect x="90" y="578" width="160" height="36" rx="4" fill="#16a34a" stroke="#15803d" stroke-width="1"/>
  <text x="170" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">CloudWatch Dashboards</text>
  <text x="170" y="609" text-anchor="middle" font-size="9" fill="#dcfce7">CPU  |  RAM  |  Network</text>
  <rect x="280" y="578" width="130" height="36" rx="4" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
  <text x="345" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Alarms</text>
  <text x="345" y="609" text-anchor="middle" font-size="9" fill="#fee2e2">CPU spike  |  Low RAM</text>
  <rect x="440" y="578" width="170" height="36" rx="4" fill="#7c3aed" stroke="#6d28d9" stroke-width="1"/>
  <text x="525" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">SNS</text>
  <text x="525" y="609" text-anchor="middle" font-size="9" fill="#ede9fe">Email alert on alarm trigger</text>

  <!-- ======================== VPC PEERING ======================== -->
  <rect x="672" y="290" width="116" height="50" rx="8" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="730" y="311" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">VPC Peering</text>
  <text x="730" y="328" text-anchor="middle" font-size="9" fill="#ede9fe">Acct A -- Acct B</text>
  <line x1="630" y1="315" x2="672" y2="315" stroke="#7c3aed" stroke-width="2.5"/>
  <line x1="788" y1="315" x2="830" y2="315" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- ======================== ACCOUNT B ======================== -->
  <rect x="830" y="68" width="340" height="600" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1000" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">Account B -- us-east-1b</text>

  <!-- VPC B border -->
  <rect x="848" y="100" width="305" height="550" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="868" y="120" font-size="11" font-weight="bold" fill="#166534">VPC B -- 192.168.0.0/16</text>

  <!-- Public subnet B -->
  <rect x="865" y="130" width="272" height="80" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="885" y="150" font-size="10" font-weight="bold" fill="#166534">Public Subnet</text>

  <!-- VPN Gateway B -->
  <rect x="885" y="158" width="140" height="36" rx="4" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="955" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">VPN Gateway</text>
  <text x="955" y="188" text-anchor="middle" font-size="9" fill="#bfdbfe">SSH: 192.168.0.32/27</text>

  <!-- GLPI EC2 -->
  <rect x="865" y="228" width="272" height="100" rx="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="1001" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">GLPI</text>
  <text x="1001" y="264" text-anchor="middle" font-size="9" fill="#fff7ed">t3.small  |  Ubuntu 24.04</text>
  <text x="1001" y="280" text-anchor="middle" font-size="9" fill="#fff7ed">Apache  |  GLPI  |  GLPIInventory</text>
  <text x="1001" y="296" text-anchor="middle" font-size="9" fill="#fff7ed">IP: 192.168.0.11</text>
  <text x="1001" y="312" text-anchor="middle" font-size="9" fill="#ffedd5">SG: HTTPS open, SSH via VPN only</text>

  <!-- GLPIInventory agents note -->
  <rect x="865" y="345" width="272" height="60" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="1001" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="#713f12">GLPIInventory Agents</text>
  <text x="1001" y="381" text-anchor="middle" font-size="9" fill="#713f12">Running on all EC2 instances</text>
  <text x="1001" y="397" text-anchor="middle" font-size="9" fill="#713f12">Report HW + SW inventory to GLPI in Acct B</text>

  <!-- CloudWatch B -->
  <rect x="865" y="420" width="272" height="80" rx="6" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="885" y="440" font-size="10" font-weight="bold" fill="#166534">CloudWatch</text>
  <rect x="885" y="448" width="110" height="36" rx="4" fill="#16a34a" stroke="#15803d" stroke-width="1"/>
  <text x="940" y="465" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Dashboard</text>
  <text x="940" y="479" text-anchor="middle" font-size="9" fill="#dcfce7">GLPI metrics</text>
  <rect x="1010" y="448" width="110" height="36" rx="4" fill="#7c3aed" stroke="#6d28d9" stroke-width="1"/>
  <text x="1065" y="465" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">SNS Alerts</text>
  <text x="1065" y="479" text-anchor="middle" font-size="9" fill="#ede9fe">Email on alarm</text>

  <!-- Legend -->
  <rect x="30" y="686" width="1140" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="50" y="700" width="14" height="14" rx="2" fill="#f97316"/>
  <text x="72" y="712" font-size="10" fill="#1e293b">EC2 Instance</text>
  <rect x="180" y="700" width="14" height="14" rx="2" fill="#d97706"/>
  <text x="202" y="712" font-size="10" fill="#1e293b">RDS (private, no public IP)</text>
  <rect x="400" y="700" width="14" height="14" rx="2" fill="#059669"/>
  <text x="422" y="712" font-size="10" fill="#1e293b">S3 Object Storage</text>
  <rect x="560" y="700" width="14" height="14" rx="2" fill="#7c3aed"/>
  <text x="582" y="712" font-size="10" fill="#1e293b">VPC Peering / Route 53</text>
  <rect x="760" y="700" width="14" height="14" rx="2" fill="#16a34a"/>
  <text x="782" y="712" font-size="10" fill="#1e293b">CloudWatch + SNS</text>
  <rect x="940" y="700" width="14" height="14" rx="2" fill="#1d4ed8"/>
  <text x="962" y="712" font-size="10" fill="#1e293b">VPN Gateway (SSH restricted)</text>
  <text x="600" y="738" text-anchor="middle" font-size="9" fill="#64748b">All web traffic via HTTPS  |  SSH only through VPN subnet 192.168.0.32/27  |  RDS has no public IP</text>

</svg>
