<svg width="1100" height="680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">AWS Vaultwarden -- Terraform Single-Command Deployment</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#64748b">420-H73-RO  |  VPC + EC2 + EIP + SG + Docker + Apache + Certbot + No-IP</text>

  <!-- ===== INTERNET ===== -->
  <ellipse cx="80" cy="310" rx="60" ry="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="80" y="306" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Internet</text>
  <text x="80" y="322" text-anchor="middle" font-size="10" fill="#64748b">HTTPS :443</text>
  <line x1="140" y1="310" x2="188" y2="310" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="164" y="302" text-anchor="middle" font-size="9" fill="#64748b">HTTPS</text>

  <!-- ===== TERRAFORM BADGE ===== -->
  <rect x="30" y="60" width="150" height="44" rx="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="105" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Terraform</text>
  <text x="105" y="94" text-anchor="middle" font-size="9" fill="#ddd6fe">terraform apply</text>
  <text x="105" y="124" text-anchor="middle" font-size="9" fill="#7c3aed">Provisions everything below</text>
  <line x1="105" y1="104" x2="105" y2="118" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ===== ELASTIC IP ===== -->
  <rect x="188" y="282" width="130" height="56" rx="6" fill="#0891b2" stroke="#0e7490" stroke-width="2"/>
  <text x="253" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Elastic IP</text>
  <text x="253" y="318" text-anchor="middle" font-size="9" fill="#cffafe">Static public IP</text>
  <text x="253" y="331" text-anchor="middle" font-size="9" fill="#cffafe">SG: 22, 80, 443 open</text>
  <line x1="318" y1="310" x2="368" y2="310" stroke="#0e7490" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== AWS VPC BORDER ===== -->
  <rect x="360" y="68" width="700" height="540" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="380" y="90" font-size="11" font-weight="bold" fill="#1d4ed8">VPC -- 10.0.0.0/24  |  Internet Gateway  |  Public Route Table</text>

  <!-- ===== EC2 INSTANCE BORDER ===== -->
  <rect x="378" y="100" width="662" height="490" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="398" y="120" font-size="10" font-weight="bold" fill="#1d4ed8">EC2 -- t2.micro  |  Ubuntu 24.04  |  RSA 4096 key  |  remote-exec bootstrap</text>

  <!-- ===== APACHE ===== -->
  <rect x="398" y="132" width="200" height="80" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="2"/>
  <text x="498" y="154" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Apache</text>
  <text x="498" y="172" text-anchor="middle" font-size="10" fill="#fee2e2">Reverse Proxy</text>
  <text x="498" y="188" text-anchor="middle" font-size="10" fill="#fee2e2">:443 (HTTPS) -- forward to :8080</text>
  <text x="498" y="204" text-anchor="middle" font-size="9" fill="#fca5a5">SSL termination with Certbot cert</text>

  <!-- Apache to Docker arrow -->
  <line x1="598" y1="172" x2="660" y2="172" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="629" y="164" text-anchor="middle" font-size="9" fill="#334155">proxy_pass</text>

  <!-- ===== DOCKER ===== -->
  <rect x="660" y="132" width="200" height="80" rx="6" fill="#0891b2" stroke="#0e7490" stroke-width="2"/>
  <text x="760" y="154" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Docker</text>
  <text x="760" y="172" text-anchor="middle" font-size="10" fill="#cffafe">vaultwarden/server:latest</text>
  <text x="760" y="188" text-anchor="middle" font-size="10" fill="#cffafe">Bound to 127.0.0.1:8080</text>
  <text x="760" y="204" text-anchor="middle" font-size="9" fill="#a5f3fc">Isolated -- no direct public access</text>

  <!-- ===== VAULTWARDEN ===== -->
  <rect x="880" y="132" width="148" height="80" rx="6" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="2"/>
  <text x="954" y="154" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Vaultwarden</text>
  <text x="954" y="170" text-anchor="middle" font-size="9" fill="#bfdbfe">Bitwarden-compatible</text>
  <text x="954" y="184" text-anchor="middle" font-size="9" fill="#bfdbfe">password manager</text>
  <text x="954" y="198" text-anchor="middle" font-size="9" fill="#bfdbfe">Port :8080 (internal)</text>
  <text x="954" y="212" text-anchor="middle" font-size="9" fill="#93c5fd">Container port</text>
  <line x1="860" y1="172" x2="880" y2="172" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== CERTBOT ===== -->
  <rect x="398" y="255" width="200" height="80" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
  <text x="498" y="277" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Certbot</text>
  <text x="498" y="295" text-anchor="middle" font-size="10" fill="#dcfce7">Let's Encrypt TLS cert</text>
  <text x="498" y="311" text-anchor="middle" font-size="10" fill="#dcfce7">Waits for DNS to resolve EIP</text>
  <text x="498" y="327" text-anchor="middle" font-size="9" fill="#86efac">before requesting certificate</text>

  <!-- ===== NO-IP DUC ===== -->
  <rect x="660" y="255" width="200" height="80" rx="6" fill="#f97316" stroke="#ea580c" stroke-width="2"/>
  <text x="760" y="277" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">No-IP DUC</text>
  <text x="760" y="295" text-anchor="middle" font-size="10" fill="#fff7ed">Dynamic DNS client</text>
  <text x="760" y="311" text-anchor="middle" font-size="10" fill="#fff7ed">Registers EIP with hostname</text>
  <text x="760" y="327" text-anchor="middle" font-size="9" fill="#ffedd5">yourvault.ddns.net</text>

  <!-- ===== SECURITY GROUP ===== -->
  <rect x="398" y="378" width="622" height="60" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="709" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Security Group</text>
  <text x="709" y="420" text-anchor="middle" font-size="10" fill="#92400e">Inbound: TCP 22 (SSH)  |  TCP 80 (HTTP)  |  TCP 443 (HTTPS)  -- all from 0.0.0.0/0</text>
  <text x="709" y="436" text-anchor="middle" font-size="10" fill="#92400e">Outbound: all traffic allowed</text>

  <!-- ===== DEPLOYMENT FLOW ===== -->
  <rect x="398" y="458" width="622" height="120" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="418" y="478" font-size="11" font-weight="bold" fill="#1e293b">Terraform Deployment Flow</text>
  <text x="418" y="498" font-size="10" fill="#334155">1. VPC + subnet + internet gateway + route table created</text>
  <text x="418" y="514" font-size="10" fill="#334155">2. Security group opens 22 / 80 / 443</text>
  <text x="418" y="530" font-size="10" fill="#334155">3. RSA 4096 key pair generated + EC2 launched</text>
  <text x="418" y="546" font-size="10" fill="#334155">4. Elastic IP attached  |  script.sh uploaded via SSH + executed as root</text>
  <text x="418" y="562" font-size="10" fill="#334155">5. Docker + Vaultwarden + Apache + No-IP + Certbot configured  |  DNS resolves  |  TLS cert issued</text>

  <!-- ===== EXTERNAL SERVICES ===== -->
  <!-- Let's Encrypt -->
  <rect x="30" y="430" width="140" height="50" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="100" y="452" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Let's Encrypt CA</text>
  <text x="100" y="468" text-anchor="middle" font-size="9" fill="#dcfce7">ACME Challenge</text>

  <!-- No-IP DNS -->
  <rect x="30" y="500" width="140" height="50" rx="6" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="100" y="522" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">No-IP DNS</text>
  <text x="100" y="538" text-anchor="middle" font-size="9" fill="#fff7ed">Dynamic DNS update</text>

  <!-- Arrows to external -->
  <line x1="498" y1="335" x2="498" y2="390" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="498" y1="390" x2="172" y2="455" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="760" y1="335" x2="760" y2="390" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="760" y1="390" x2="172" y2="525" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- Incoming traffic arrow from Elastic IP -->
  <line x1="368" y1="310" x2="398" y2="172" stroke="#dc2626" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="30" y="580" width="1040" height="80" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="50" y="600" font-size="11" font-weight="bold" fill="#1e293b">Stack</text>
  <rect x="50" y="610" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="70" y="621" font-size="10" fill="#1e293b">Apache (reverse proxy)</text>
  <rect x="220" y="610" width="12" height="12" rx="2" fill="#0891b2"/>
  <text x="240" y="621" font-size="10" fill="#1e293b">Docker (container runtime)</text>
  <rect x="430" y="610" width="12" height="12" rx="2" fill="#1d4ed8"/>
  <text x="450" y="621" font-size="10" fill="#1e293b">Vaultwarden (password manager)</text>
  <rect x="660" y="610" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="680" y="621" font-size="10" fill="#1e293b">Certbot (TLS cert)</text>
  <rect x="800" y="610" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="820" y="621" font-size="10" fill="#1e293b">No-IP DUC (dynamic DNS)</text>
  <rect x="50" y="634" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="70" y="645" font-size="10" fill="#1e293b">Terraform (IaC provisioner)</text>
  <rect x="220" y="634" width="12" height="12" rx="2" fill="#0891b2"/>
  <text x="240" y="645" font-size="10" fill="#1e293b">Elastic IP (static public IP)</text>
  <text x="660" y="645" font-size="10" fill="#64748b">Access: https://yourvault.ddns.net  after terraform apply completes</text>

</svg>
